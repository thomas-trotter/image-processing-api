version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-processing-api
    ports:
      - "8000:8000"
    volumes:
      - image_uploads:/app/app/static/uploaded
      - image_edited:/app/app/static/edited
      - image_detected:/app/app/static/detected
      - app_logs:/app/logs
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  image_uploads:
  image_edited:
  image_detected:
  app_logs:

